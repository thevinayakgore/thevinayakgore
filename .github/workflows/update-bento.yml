name: Daily OpBento Update

on:
  schedule:
    - cron: "30 19 * * *"   # 19:30 UTC = 00:30 IST (next day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update README with fresh OpBento URL
        run: bun getNewBento.ts

      - name: Commit and push changes
        run: |
          git config --global user.name "thevinayakgore"
          git config --global user.email "thevinayakgore@gmail.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update OpBento image [skip ci]"
          git push